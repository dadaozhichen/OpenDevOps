# 推送以 v 开头的 tag（如 v0.1.0）时构建多平台 wheel + sdist，并写入 GitHub Release 资源。
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ["3.9", "3.10", "3.11", "3.12"]
      - run: pip install "build>=1.2.0"
      - run: python -m build -s -o dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*

  wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install "build>=1.2.0"
      - run: python -m build -w -o dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-wheel-${{ matrix.os }}
          path: dist/*.whl

  github-release:
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
