# On push of a v* tag (e.g. v0.1.5):
# 1) Prebuild scan_native / tree_sitter_native; wheels per platform + one sdist
# 2) Create GitHub Release and upload artifacts (pip install wheel needs no local MSVC)
# 3) Publish to PyPI after Release succeeds
#
# PyPI: add a Trusted Publisher at https://pypi.org/manage/account/publishing/
# Type GitHub, this repo owner/name, workflow file Release, environment empty unless you add one below.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: Vendor tree-sitter grammars
        env:
          PYTHONUTF8: "1"
        run: python scripts/ensure_vendor_tree_sitter.py
      - run: pip install "build>=1.2.0"
      - run: python -m build -s -o dist
      - uses: actions/upload-artifact@v6
        with:
          name: dist-sdist
          path: dist/*

  wheels:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Vendor tree-sitter grammars
        env:
          PYTHONUTF8: "1"
        run: python scripts/ensure_vendor_tree_sitter.py
      - name: Install build deps
        run: pip install "build>=1.2.0" "pybind11>=2.11"
      - name: Prebuild wheel (native extensions)
        run: python -m build -w -o dist
      # PyPI rejects bare linux_x86_64; require manylinux_* (PEP 600)
      - name: Linux wheel to manylinux (PyPI)
        if: runner.os == 'Linux'
        run: |
          pip install auditwheel
          mkdir -p wheelhouse
          auditwheel repair dist/*.whl -w wheelhouse
          rm -f dist/*.whl
          mv wheelhouse/*.whl dist/
      - name: Verify prebuilt native modules in wheel
        env:
          PYTHONUTF8: "1"
        shell: bash
        run: python scripts/verify_wheel.py dist/*.whl
      - uses: actions/upload-artifact@v6
        with:
          name: dist-wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  github-release:
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    needs: [github-release]
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Without PyPI Trusted Publisher, use API token instead:
          # password: ${{ secrets.PYPI_API_TOKEN }}
